<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUGOOO · 反馈管理后台</title>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f5f7fa;min-height:100vh;color:#222}

/* Login overlay */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a73e8,#0d47a1);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;padding:40px 32px;border-radius:16px;text-align:center;max-width:340px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-box h2{font-size:20px;color:#1a73e8;margin-bottom:8px}
.login-box p{font-size:13px;color:#888;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:16px;outline:none}
.login-box input:focus{border-color:#1a73e8}
.login-box button{width:100%;padding:12px;border:none;border-radius:10px;background:#1a73e8;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.login-box button:hover{background:#0d47a1}
.login-box .error{color:#e53935;font-size:13px;margin-top:12px;display:none}

/* Main content */
header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:20px;text-align:center}
header h1{font-size:20px;margin-bottom:4px}
header p{font-size:13px;opacity:.85}
.stats{display:flex;gap:12px;padding:16px;flex-wrap:wrap}
.stat{flex:1;min-width:80px;background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat b{font-size:28px;color:#1a73e8;display:block}
.stat span{font-size:12px;color:#888;margin-top:4px;display:block}
.controls{padding:0 16px 12px;display:flex;gap:10px;flex-wrap:wrap}
.controls button{padding:10px 20px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600}
.btn-refresh{background:#1a73e8;color:#fff}
.btn-csv{background:#4caf50;color:#fff}
.btn-clear{background:#e53935;color:#fff}
.btn-logout{background:#666;color:#fff}
.table-wrap{overflow-x:auto;padding:0 16px 16px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);font-size:13px}
th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #eee;vertical-align:top}
th{background:#f0f4ff;color:#1a73e8;font-weight:600;position:sticky;top:0;white-space:nowrap}
td{word-break:break-all;white-space:pre-wrap;max-width:400px}
tr:last-child td{border-bottom:none}
.empty{padding:40px;text-align:center;color:#999;font-size:15px}
.img-thumbs{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.img-thumb{position:relative;width:50px;height:50px;border-radius:4px;overflow:hidden;border:1px solid #ddd;cursor:pointer}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb .del-icon{position:absolute;top:0;right:0;width:14px;height:14px;background:rgba(229,57,53,.9);color:#fff;border:none;border-radius:0 0 0 4px;font-size:10px;line-height:14px;text-align:center;cursor:pointer;display:none}
.img-thumb:hover .del-icon{display:block}
.img-preview-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9999}
.img-preview-modal.active{display:flex}
.img-preview-modal img{max-width:90%;max-height:90%;border-radius:8px}
.img-preview-modal .close-btn{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.9);border:none;border-radius:50%;font-size:24px;cursor:pointer}
.img-label{font-size:11px;color:#888;margin-bottom:2px}
td.cell-imgs{min-width:180px}
.checkbox-col{width:36px;text-align:center}
.controls-2{padding:0 16px 8px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.controls-2 button{padding:8px 14px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.btn-delete-selected{background:#e53935;color:#fff}
.btn-delete-selected:disabled{background:#ccc;cursor:not-allowed}
.delete-row-btn{background:#e53935;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer}
.delete-row-btn:hover{background:#c62828}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>反馈管理后台登录</h2>
    <p>请输入访问密码</p>
    <input type="password" id="pwdInput" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">进入后台</button>
    <div class="error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- Main Content -->
<header>
  <h1>EUGOOO 反馈管理后台</h1>
  <p>实时反馈 · 自动刷新 · 支持导出CSV</p>
</header>
<div class="stats" id="stats"></div>
<div class="controls">
  <button class="btn-refresh" onclick="load()">刷新数据</button>
  <button class="btn-csv" onclick="downloadCSV()">导出 CSV</button>
  <button class="btn-clear" onclick="clearData()">清空数据</button>
  <button class="btn-logout" onclick="doLogout()">退出登录</button>
</div>
<div class="controls-2">
  <button class="btn-delete-selected" id="btnDelSelected" onclick="deleteSelected()" disabled>删除选中</button>
  <span style="font-size:12px;color:#888" id="selectedInfo"></span>
</div>
<div class="table-wrap" id="tableArea"></div>
<div class="img-preview-modal" id="previewModal" onclick="closePreview()">
  <button class="close-btn">×</button>
  <img id="previewImg" src="" alt="预览">
</div>

<script>
var FEEDBACK_URL = 'https://mantledb.sh/v2/eugooo/feedback';
var DATA = [];
var AUTH_KEY = 'eugooo_feedback_admin_auth';

// Check if already logged in
function checkAuth(){
  if(sessionStorage.getItem(AUTH_KEY) === '1'){
    document.getElementById('loginOverlay').style.display = 'none';
    load();
    setInterval(load, 30000);
  }
}

// SHA256
async function sha256(str){
  var buf = new TextEncoder().encode(str);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

// Login
async function doLogin(){
  var pwd = document.getElementById('pwdInput').value;
  var hash = await sha256(pwd);
  if(hash === EUGOO_CONFIG.adminPasswordHash){
    sessionStorage.setItem(AUTH_KEY, '1');
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('loginError').style.display = 'none';
    load();
    setInterval(load, 30000);
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

// Logout
function doLogout(){
  sessionStorage.removeItem(AUTH_KEY);
  location.reload();
}

function load(){
  document.getElementById('tableArea').innerHTML = '<div class="empty">加载中...</div>';
  fetch(FEEDBACK_URL + '?t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){
      DATA = Array.isArray(d) ? d : [];
      render();
    })
    .catch(function(){
      document.getElementById('tableArea').innerHTML = '<div class="empty">加载失败，请检查网络或刷新重试<br><small>API: ' + FEEDBACK_URL + '</small></div>';
    });
}

function wrapLongText(text, maxLen){
  if(!text) return '';
  var str = String(text);
  if(str.length <= maxLen) return escapeHtml(str);
  var result = '';
  for(var i = 0; i < str.length; i += maxLen){
    if(i > 0) result += '\n';
    result += str.substring(i, i + maxLen);
  }
  return escapeHtml(result);
}

function escapeHtml(str){
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

var selectedRows = {};

function getSuggestionImages(r){
  if(r.suggestionImages && Array.isArray(r.suggestionImages)) return r.suggestionImages;
  if(r.images && Array.isArray(r.images)) return r.images;
  return [];
}

function getComplaintImages(r){
  if(r.complaintImages && Array.isArray(r.complaintImages)) return r.complaintImages;
  return [];
}

function renderImgThumbs(imgs, rowIdx, field){
  if(!imgs || !imgs.length) return '';
  var html = '<div class="img-label">图片('+imgs.length+')</div><div class="img-thumbs">';
  imgs.forEach(function(src, i){
    html += '<div class="img-thumb">' +
      '<img src="'+src+'" onclick="openPreview(\''+src.replace(/'/g,"\\'")+'\')" alt="图'+(i+1)+'">' +
      '<button class="del-icon" onclick="deleteImage('+rowIdx+',\''+field+'\','+i+');event.stopPropagation()" title="删除图片">×</button>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

function openPreview(src){
  var modal = document.getElementById('previewModal');
  var img = document.getElementById('previewImg');
  img.src = src;
  modal.classList.add('active');
}

function closePreview(){
  var modal = document.getElementById('previewModal');
  modal.classList.remove('active');
}

function toggleSelect(idx){
  var cb = document.getElementById('rowCheck_'+idx);
  if(cb.checked){
    selectedRows[idx] = true;
  } else {
    delete selectedRows[idx];
  }
  updateSelectedInfo();
}

function updateSelectedInfo(){
  var count = Object.keys(selectedRows).length;
  var btn = document.getElementById('btnDelSelected');
  var info = document.getElementById('selectedInfo');
  btn.disabled = count === 0;
  info.textContent = count > 0 ? '已选 ' + count + ' 条' : '';
}

function deleteImage(rowIdx, field, imgIdx){
  if(!confirm('确定删除这张图片吗？')) return;
  var r = DATA[rowIdx];
  if(!r) return;
  var key = field === 'suggestion' ? 'suggestionImages' : 'complaintImages';
  if(!r[key] || !Array.isArray(r[key])){
    if(field === 'suggestion' && r.images && Array.isArray(r.images)){
      r.images.splice(imgIdx, 1);
    } else {
      return;
    }
  } else {
    r[key].splice(imgIdx, 1);
  }
  saveData();
}

function deleteRow(idx){
  if(!confirm('确定删除这条反馈吗？')) return;
  DATA.splice(idx, 1);
  delete selectedRows[idx];
  saveData();
}

function deleteSelected(){
  var indices = Object.keys(selectedRows).map(Number).sort(function(a,b){ return b-a; });
  if(indices.length === 0) return;
  if(!confirm('确定删除选中的 ' + indices.length + ' 条反馈吗？')) return;
  indices.forEach(function(i){ DATA.splice(i, 1); });
  selectedRows = {};
  saveData();
}

function saveData(){
  fetch(FEEDBACK_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(DATA)
  })
    .then(function(r){
      if(r.ok){
        render();
      } else {
        alert('保存失败');
        load();
      }
    })
    .catch(function(){
      alert('保存失败，请检查网络');
      load();
    });
}

function render(){
  var lastTime = DATA.length ? DATA[DATA.length-1].time : '-';
  var sugImgCount = 0, comImgCount = 0;
  DATA.forEach(function(r){
    sugImgCount += getSuggestionImages(r).length;
    comImgCount += getComplaintImages(r).length;
  });
  document.getElementById('stats').innerHTML =
    '<div class="stat"><b>' + DATA.length + '</b><span>总反馈数</span></div>' +
    '<div class="stat"><b>' + (sugImgCount + comImgCount) + '</b><span>图片总数</span></div>' +
    '<div class="stat"><b>' + lastTime + '</b><span>最后更新</span></div>';

  if(!DATA.length){
    document.getElementById('tableArea').innerHTML = '<div class="empty">暂无反馈数据</div>';
    updateSelectedInfo();
    return;
  }
  var rows = DATA.map(function(r, idx){
    var sugImgs = getSuggestionImages(r);
    var comImgs = getComplaintImages(r);
    var checked = selectedRows[idx] ? 'checked' : '';
    return '<tr>' +
      '<td class="checkbox-col"><input type="checkbox" id="rowCheck_'+idx+'" '+checked+' onchange="toggleSelect('+idx+')"></td>' +
      '<td>'+escapeHtml(r.nickname||'')+'</td>' +
      '<td>'+escapeHtml(r.phone||'')+'</td>' +
      '<td>'+escapeHtml(r.email||'')+'</td>' +
      '<td class="cell-imgs">'+wrapLongText(r.suggestion,200)+renderImgThumbs(sugImgs, idx, 'suggestion')+'</td>' +
      '<td class="cell-imgs">'+wrapLongText(r.complaint,200)+renderImgThumbs(comImgs, idx, 'complaint')+'</td>' +
      '<td>'+escapeHtml(r.time||'')+'</td>' +
      '<td><button class="delete-row-btn" onclick="deleteRow('+idx+')">删除</button></td>' +
      '</tr>';
  }).join('');
  document.getElementById('tableArea').innerHTML =
    '<table><thead><tr>' +
    '<th class="checkbox-col"><input type="checkbox" id="checkAll" '+(isAllSelected()?'checked':'')+' onchange="toggleSelectAll(this)"></th>' +
    '<th>昵称</th><th>手机号</th><th>邮箱</th><th>建议</th><th>吐槽</th><th>时间</th><th>操作</th>' +
    '</tr></thead><tbody>'+rows+'</tbody></table>';
  updateSelectedInfo();
}

function toggleSelectAll(cb){
  if(cb.checked){
    DATA.forEach(function(_, i){ selectedRows[i] = true; });
  } else {
    selectedRows = {};
  }
  render();
}

function isAllSelected(){
  if(DATA.length === 0) return false;
  return Object.keys(selectedRows).length === DATA.length;
}

function downloadCSV(){
  var csv = '\uFEFF昵称,手机号,邮箱,建议,吐槽,时间\n';
  DATA.forEach(function(r){
    csv += [r.nickname||'', r.phone||'', r.email||'', r.suggestion||'', r.complaint||'', r.time||''].join(',') + '\n';
  });
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eugooo_feedback.csv';
  a.click();
}

function clearData(){
  if(!confirm('确定要清空所有反馈数据？此操作不可撤销。')) return;
  fetch(FEEDBACK_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: '[]'
  })
    .then(function(r){
      if(r.ok){
        alert('已清空');
      } else {
        alert('清空失败');
      }
      load();
    })
    .catch(function(){ alert('清空失败，请检查网络'); });
}

checkAuth();
</script>
</body>
</html>
